<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexPad — Test Suite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #f0f0f0;
  font-family: 'Courier New', monospace;
  padding: 30px;
}
h1 {
  color: #ff4500;
  font-size: 1.8rem;
  margin-bottom: 5px;
  letter-spacing: 3px;
}
.subtitle { color: #555; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 2px; }
.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}
.card h2 { color: #ff4500; font-size: 1rem; letter-spacing: 2px; margin-bottom: 15px; }
.input-group { margin-bottom: 12px; }
label { display: block; color: #666; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 4px; }
input {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #f0f0f0;
  padding: 10px 14px;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
}
input:focus { outline: none; border-color: #ff4500; }
.btn {
  background: linear-gradient(135deg, #ff2d2d, #ff6b00);
  color: white;
  border: none;
  padding: 14px 30px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
  font-weight: bold;
  letter-spacing: 2px;
  width: 100%;
  transition: opacity 0.3s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: #1a1a1a;
  border: 1px solid #ff4500;
  color: #ff4500;
  margin-top: 10px;
}
.log-container {
  background: #050505;
  border: 1px solid #1a1a1a;
  border-radius: 4px;
  padding: 15px;
  height: 400px;
  overflow-y: auto;
  font-size: 0.8rem;
  line-height: 1.8;
}
.log-entry { padding: 2px 0; border-bottom: 1px solid #0f0f0f; }
.log-entry.success { color: #22c55e; }
.log-entry.error { color: #ef4444; }
.log-entry.info { color: #3b82f6; }
.log-entry.warning { color: #f59e0b; }
.log-entry.pending { color: #888; }
.status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.status-item {
  background: #111;
  border: 1px solid #222;
  padding: 12px;
  border-radius: 4px;
}
.status-label { color: #555; font-size: 0.7rem; letter-spacing: 1px; }
.status-value { color: #ff4500; font-size: 0.9rem; font-weight: bold; margin-top: 4px; }
.test-steps {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}
.step {
  background: #111;
  border: 1px solid #222;
  padding: 10px;
  border-radius: 4px;
  text-align: center;
  font-size: 0.75rem;
  color: #444;
  transition: all 0.3s;
}
.step.active { border-color: #ff4500; color: #ff4500; }
.step.done { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.05); }
.step.failed { border-color: #ef4444; color: #ef4444; }
.progress-bar {
  height: 4px;
  background: #1a1a1a;
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff2d2d, #ff6b00);
  width: 0%;
  transition: width 0.5s ease;
}
</style>
</head>
<body>

<h1>⚡ APEXPAD TEST SUITE</h1>
<p class="subtitle">// AUTOMATED SMART CONTRACT TESTING — BSC TESTNET</p>

<!-- CONFIG -->
<div class="card">
  <h2>📋 CONFIGURATION</h2>
  <div class="input-group">
    <label>FACTORY ADDRESS</label>
    <input id="factoryAddr" value="0x016BC1c919529A60f35276dD4d47d33900b72bbF" />
  </div>
  <div class="input-group">
    <label>TEST TOKEN ADDRESS (TestToken deployed)</label>
    <input id="tokenAddr" placeholder="0x... paste your TestToken address here" />
  </div>
  <div class="input-group">
    <label>CONTRIBUTION AMOUNT (BNB)</label>
    <input id="contribAmount" value="0.01" />
  </div>
  <button class="btn" onclick="connectWallet()">🦊 CONNECT METAMASK</button>
</div>

<!-- STATUS -->
<div class="status-grid">
  <div class="status-item">
    <div class="status-label">WALLET</div>
    <div class="status-value" id="walletStatus">NOT CONNECTED</div>
  </div>
  <div class="status-item">
    <div class="status-label">NETWORK</div>
    <div class="status-value" id="networkStatus">—</div>
  </div>
  <div class="status-item">
    <div class="status-label">PRESALE CONTRACT</div>
    <div class="status-value" id="presaleStatus">—</div>
  </div>
  <div class="status-item">
    <div class="status-label">TEST RESULT</div>
    <div class="status-value" id="testResult">—</div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- TEST STEPS -->
<div class="test-steps">
  <div class="step" id="step1">1. Connect</div>
  <div class="step" id="step2">2. Deploy Presale</div>
  <div class="step" id="step3">3. Fund Tokens</div>
  <div class="step" id="step4">4. Contribute</div>
  <div class="step" id="step5">5. Finalize</div>
  <div class="step" id="step6">6. Claim Tokens</div>
  <div class="step" id="step7">7. All Tests ✅</div>
</div>

<!-- RUN TESTS -->
<div class="card">
  <h2>🚀 RUN FULL TEST SUITE</h2>
  <button class="btn" id="runBtn" onclick="runAllTests()" disabled>▶ RUN ALL TESTS — ONE CLICK</button>
  <button class="btn btn-secondary" onclick="clearLogs()">🗑 CLEAR LOGS</button>
</div>

<!-- LOGS -->
<div class="card">
  <h2>📟 TEST LOGS</h2>
  <div class="log-container" id="logs"></div>
</div>

<script>
// ═══════════════════════════════════════════
// ABIs
// ═══════════════════════════════════════════

const FACTORY_ABI = [
  "function createPresale(address _token, uint256[8] memory _nums, string memory _name, string memory _website, string memory _telegram) external returns (address)",
  "function presaleCount() view returns (uint256)",
  "function presales(uint256) view returns (address)",
  "event PresaleCreated(uint256 indexed id, address presale, address token, address projectOwner, string name)"
];

const PRESALE_ABI = [
  "function contribute() external payable",
  "function finalize() external",
  "function claimTokens() external",
  "function cancel() external",
  "function claimRefund() external",
  "function totalRaised() view returns (uint256)",
  "function finalized() view returns (bool)",
  "function cancelled() view returns (bool)",
  "function getContribution(address) view returns (uint256)",
  "function getTokensOwed(address) view returns (uint256)",
  "function isActive() view returns (bool)",
  "receive() external payable"
];

const TOKEN_ABI = [
  "function transfer(address to, uint256 amount) external returns (bool)",
  "function approve(address spender, uint256 amount) external returns (bool)",
  "function balanceOf(address) view returns (uint256)",
  "function allowance(address owner, address spender) view returns (uint256)"
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════

let provider, signer, wallet;
let factoryContract, tokenContract, presaleContract;
let presaleAddress = null;
let testsPassed = 0;
const totalTests = 6;

// ═══════════════════════════════════════════
// LOGGING
// ═══════════════════════════════════════════

function log(msg, type = 'info') {
  const container = document.getElementById('logs');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  const time = new Date().toLocaleTimeString();
  const icons = { success: '✅', error: '❌', info: '🔵', warning: '⚠️', pending: '⏳' };
  entry.textContent = `[${time}] ${icons[type] || '•'} ${msg}`;
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
}

function clearLogs() {
  document.getElementById('logs').innerHTML = '';
  log('Logs cleared', 'info');
}

function setStep(stepNum, status) {
  const el = document.getElementById(`step${stepNum}`);
  if (el) {
    el.className = `step ${status}`;
    const labels = ['', 'Connect', 'Deploy Presale', 'Fund Tokens', 'Contribute', 'Finalize', 'Claim Tokens', 'All Tests ✅'];
    const icons = { active: '⚡ ', done: '✅ ', failed: '❌ ' };
    el.textContent = (icons[status] || '') + labels[stepNum];
  }
  const progress = (testsPassed / totalTests) * 100;
  document.getElementById('progressFill').style.width = `${progress}%`;
}

// ═══════════════════════════════════════════
// CONNECT WALLET
// ═══════════════════════════════════════════

async function connectWallet() {
  try {
    log('Connecting MetaMask...', 'pending');
    if (!window.ethereum) throw new Error('MetaMask not found!');
    
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send('eth_requestAccounts', []);
    signer = await provider.getSigner();
    wallet = await signer.getAddress();
    
    const network = await provider.getNetwork();
    
    document.getElementById('walletStatus').textContent = wallet.slice(0,6) + '...' + wallet.slice(-4);
    document.getElementById('networkStatus').textContent = `Chain ${network.chainId}`;
    
    if (network.chainId !== 97n) {
      log('⚠️ Please switch to BSC Testnet (chainId 97)!', 'warning');
    } else {
      log(`Connected: ${wallet}`, 'success');
      log('BSC Testnet ✅', 'success');
      document.getElementById('runBtn').disabled = false;
      setStep(1, 'done');
      testsPassed = 1;
    }
  } catch (err) {
    log(`Connection error: ${err.message}`, 'error');
    setStep(1, 'failed');
  }
}

// ═══════════════════════════════════════════
// RUN ALL TESTS
// ═══════════════════════════════════════════

async function runAllTests() {
  document.getElementById('runBtn').disabled = true;
  document.getElementById('testResult').textContent = 'RUNNING...';
  
  log('═══ STARTING FULL TEST SUITE ═══', 'info');

  try {
    // INIT CONTRACTS
    const factoryAddr = document.getElementById('factoryAddr').value;
    const tokenAddr = document.getElementById('tokenAddr').value;
    
    if (!tokenAddr || tokenAddr.length < 10) {
      log('Please enter TestToken address!', 'error');
      document.getElementById('runBtn').disabled = false;
      return;
    }
    
    factoryContract = new ethers.Contract(factoryAddr, FACTORY_ABI, signer);
    tokenContract = new ethers.Contract(tokenAddr, TOKEN_ABI, signer);

    // ─── TEST 1: CREATE PRESALE ───
    log('', 'info');
    log('TEST 1 — createPresale()', 'info');
    setStep(2, 'active');
    
    const now = Math.floor(Date.now() / 1000);
    const nums = [
      ethers.parseEther('1000'),      // tokenPrice: 1000 tokens per BNB
      ethers.parseEther('0.05'),      // softCap: 0.05 BNB
      ethers.parseEther('1'),         // hardCap: 1 BNB
      ethers.parseEther('0.01'),      // minContrib: 0.01 BNB
      ethers.parseEther('0.5'),       // maxContrib: 0.5 BNB
      BigInt(now - 3600),             // startTime: 1h ago
      BigInt(now + 3600),             // endTime: 1h from now
      60n                             // lpPercent: 60%
    ];
    
    log('Creating presale...', 'pending');
    const tx1 = await factoryContract.createPresale(
      tokenAddr, nums,
      'Test Presale', 'https://apexpad.io', 'https://t.me/test'
    );
    log(`TX: ${tx1.hash}`, 'pending');
    const receipt1 = await tx1.wait();
    
    // Get presale address from event
    const count = await factoryContract.presaleCount();
    presaleAddress = await factoryContract.presales(count - 1n);
    
    presaleContract = new ethers.Contract(presaleAddress, PRESALE_ABI, signer);
    document.getElementById('presaleStatus').textContent = presaleAddress.slice(0,8) + '...';
    
    log(`Presale created: ${presaleAddress}`, 'success');
    setStep(2, 'done');
    testsPassed = 2;

    // ─── TEST 2: FUND TOKENS ───
    log('', 'info');
    log('TEST 2 — Fund presale with tokens', 'info');
    setStep(3, 'active');
    
    const tokensToSend = ethers.parseEther('10000000'); // 10M tokens
    log('Transferring tokens to presale...', 'pending');
    const tx2 = await tokenContract.transfer(presaleAddress, tokensToSend);
    log(`TX: ${tx2.hash}`, 'pending');
    await tx2.wait();
    
    const bal = await tokenContract.balanceOf(presaleAddress);
    log(`Presale token balance: ${ethers.formatEther(bal)} TEST`, 'success');
    setStep(3, 'done');
    testsPassed = 3;

    // ─── TEST 3: CONTRIBUTE ───
    log('', 'info');
    log('TEST 3 — contribute()', 'info');
    setStep(4, 'active');
    
    const contribAmount = document.getElementById('contribAmount').value;
    log(`Contributing ${contribAmount} BNB...`, 'pending');
    const tx3 = await presaleContract.contribute({ value: ethers.parseEther(contribAmount) });
    log(`TX: ${tx3.hash}`, 'pending');
    await tx3.wait();
    
    const totalAfterContrib = await presaleContract.totalRaised();
    log(`Total raised: ${ethers.formatEther(totalAfterContrib)} BNB`, "success");
    setStep(4, 'done');
    testsPassed = 4;

    // ─── TEST 4: FINALIZE ───
    log('', 'info');
    log('TEST 4 — finalize() — need softcap reached', 'info');
    setStep(5, 'active');
    
    const totalRaised = await presaleContract.totalRaised();
    log(`Total raised: ${ethers.formatEther(totalRaised)} BNB`, 'info');
    log('SoftCap = 0.05 BNB — need more contributions...', 'warning');
    
    // Contribute more to reach softcap
    const needed = ethers.parseEther('0.05') - totalRaised;
    if (needed > 0n) {
      log(`Contributing more to reach softcap: ${ethers.formatEther(needed)} BNB`, 'pending');
      const tx4b = await presaleContract.contribute({ value: needed });
      await tx4b.wait();
      log('SoftCap reached! ✅', 'success');
    }
    
    // Need to wait for endTime or reach hardcap — use cancel for now
    log('Presale still active — testing cancel() instead', 'warning');
    const tx4 = await presaleContract.cancel();
    log(`TX: ${tx4.hash}`, 'pending');
    await tx4.wait();
    
    const cancelled = await presaleContract.cancelled();
    log(`Presale cancelled: ${cancelled}`, 'success');
    setStep(5, 'done');
    testsPassed = 5;

    // ─── TEST 5: CLAIM REFUND ───
    log('', 'info');
    log('TEST 5 — claimRefund()', 'info');
    setStep(6, 'active');
    
    const balBefore = await provider.getBalance(wallet);
    const tx5 = await presaleContract.claimRefund();
    log(`TX: ${tx5.hash}`, 'pending');
    await tx5.wait();
    
    const balAfter = await provider.getBalance(wallet);
    const refunded = balAfter - balBefore;
    log(`Refund received! ~${ethers.formatEther(refunded)} BNB`, 'success');
    setStep(6, 'done');
    testsPassed = 6;

    // ─── ALL DONE ───
    log('', 'info');
    log('═══════════════════════════════', 'success');
    log('🎉 ALL TESTS PASSED! ApexPad is ready!', 'success');
    log('═══════════════════════════════', 'success');
    setStep(7, 'done');
    document.getElementById('testResult').textContent = '✅ ALL PASSED';
    document.getElementById('testResult').style.color = '#22c55e';
    document.getElementById('progressFill').style.width = '100%';

  } catch (err) {
    log(`TEST FAILED: ${err.message}`, 'error');
    document.getElementById('testResult').textContent = '❌ FAILED';
    document.getElementById('testResult').style.color = '#ef4444';
    document.getElementById('runBtn').disabled = false;
  }
}
</script>
</body>
</html>
